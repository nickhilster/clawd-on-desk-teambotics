<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-yawn-stretch 3s ease-in-out 1; }
      @keyframes db-yawn-stretch {
        0%, 100% { transform: scale(1, 1); }
        50%      { transform: scale(0.98, 1.05); }
      }
      .z-pop { animation: db-z-pop 3s ease-out 1; }
      @keyframes db-z-pop {
        0%   { opacity: 0; transform: translateY(4px) scale(0.6); }
        40%  { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-6px) scale(1); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g stroke="#1a1025" stroke-width="1.3" fill="none" stroke-linecap="round">
      <path d="M6.5 13 Q9 15 11.5 13"/>
      <path d="M14.5 13 Q17 15 19.5 13"/>
    </g>
    <ellipse cx="13" cy="20" rx="2.6" ry="3.4" fill="#1a1025"/>
  </g>
  <text class="z-pop" x="25" y="8" font-size="5" font-weight="700" fill="#ffffff">z</text>
</svg>
