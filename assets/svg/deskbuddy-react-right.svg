<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 50%; animation: db-flinch-right 0.5s ease-out 1; }
      @keyframes db-flinch-right {
        0%   { transform: translateX(0) scale(1,1); }
        30%  { transform: translateX(2px) scale(0.9,1.1); }
        100% { transform: translateX(0) scale(1,1); }
      }
      .boop { animation: db-boop 0.5s ease-out 1; }
      @keyframes db-boop {
        0%   { opacity: 1; transform: scale(0.4); }
        100% { opacity: 0; transform: scale(1.4); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <circle cx="9" cy="13" r="2"/>
      <circle cx="17" cy="13" r="2"/>
    </g>
    <path d="M9 19.5 Q13 18.5 17 19.5" stroke="#1a1025" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  </g>
  <path class="boop" x="1" d="M1 12 l0.5 1.1 1.1 0.2 -0.8 0.8 0.2 1.1 -1 -0.5 -1 0.5 0.2 -1.1 -0.8 -0.8 1.1 -0.2 Z" fill="#ffd166"/>
</svg>
