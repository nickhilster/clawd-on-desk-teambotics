<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-sleep-breathe 4.5s ease-in-out infinite; }
      @keyframes db-sleep-breathe {
        0%, 100% { transform: scale(1, 0.94) translateY(1px); }
        50%      { transform: scale(1.015, 0.95) translateY(0.8px); }
      }
      .zzz { animation: db-zzz 3s ease-in-out infinite; }
      .zzz2 { animation-delay: 1s; }
      @keyframes db-zzz {
        0%   { opacity: 0; transform: translate(0, 4px) scale(0.7); }
        30%  { opacity: 1; transform: translate(0, 0) scale(1); }
        80%  { opacity: 1; transform: translate(1px, -6px) scale(1.1); }
        100% { opacity: 0; transform: translate(1px, -8px) scale(1.1); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="8" ry="1.3" fill="#000000" opacity="0.3"/>
  <g id="body-js">
    <circle cx="13" cy="17" r="11" fill="url(#db-gradient)"/>
    <circle cx="13" cy="17" r="11" fill="#1e3a8a" opacity="0.25"/>
    <g stroke="#1a1025" stroke-width="1.3" fill="none" stroke-linecap="round">
      <path d="M6 15 Q9 17 12 15"/>
      <path d="M14 15 Q17 17 20 15"/>
    </g>
    <path d="M10 21 Q13 22 16 21" stroke="#1a1025" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  </g>
  <text class="zzz" x="24" y="4" font-size="5" font-weight="700" fill="#c7d2fe">z</text>
  <text class="zzz zzz2" x="28" y="-2" font-size="7" font-weight="700" fill="#c7d2fe">Z</text>
</svg>
