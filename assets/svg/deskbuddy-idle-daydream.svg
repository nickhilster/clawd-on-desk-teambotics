  <path class="star-wander" d="M22 6 l0.6 1.4 1.4 0.2 -1 1 0.2 1.4 -1.2 -0.7 -1.2 0.7 0.2 -1.4 -1 -1 1.4 -0.2 Z" fill="#ffd166"/>
