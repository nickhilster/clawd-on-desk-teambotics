<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      .spark { animation: db-spark 1.4s ease-in-out infinite; }
      .spark2 { animation-delay: 0.4s; }
      @keyframes db-spark {
        0%, 100% { opacity: 0.3; }
        50%      { opacity: 1; }
      }
      #body-js { transform-box: fill-box; transform-origin: 50% 50%; animation: db-work-bounce 0.9s ease-in-out infinite; }
      @keyframes db-work-bounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-0.4px); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <ellipse cx="9" cy="14" rx="1.8" ry="0.9"/>
      <ellipse cx="17" cy="14" rx="1.8" ry="0.9"/>
    </g>
    <circle cx="13" cy="20" r="1.2" fill="#1a1025"/>
  </g>
  <g stroke="#ffffff" stroke-width="0.9" stroke-linecap="round" opacity="0.9">
    <line class="spark" x1="27" y1="6" x2="30" y2="4"/>
    <line class="spark spark2" x1="28" y1="10" x2="32" y2="9.5"/>
  </g>
</svg>
