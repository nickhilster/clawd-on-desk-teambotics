<svg xmlns="http://www.w3.org/2000/svg" viewBox="-7 -8 28 28" width="200" height="200">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-hop 0.5s ease-in-out infinite; }
      @keyframes db-hop {
        0%, 100% { transform: translate(0,0) scale(1,1); }
        40%      { transform: translate(1.5px,-2px) scale(1.05,0.95); }
        70%      { transform: translate(3px,0) scale(0.95,1.05); }
      }
      .puff { animation: db-puff 0.5s ease-out infinite; }
      @keyframes db-puff {
        0%   { opacity: 0.7; transform: scale(0.6); }
        100% { opacity: 0; transform: scale(1.2) translateX(-2px); }
      }
    </style>
  </defs>
  <ellipse cx="7" cy="14" rx="5" ry="0.9" fill="#000000" opacity="0.3"/>
  <g id="body-js">
    <circle cx="7" cy="8" r="6" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <circle cx="5" cy="7" r="1"/>
      <circle cx="9" cy="7" r="1"/>
    </g>
    <path d="M5 10 Q7 11.2 9 10" stroke="#1a1025" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  </g>
  <circle class="puff" cx="0" cy="14" r="1" fill="#cbd5e1"/>
</svg>
