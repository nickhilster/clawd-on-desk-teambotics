<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      .eyes-look { transform-box: fill-box; transform-origin: 50% 50%; animation: db-look 6s ease-in-out infinite; }
      @keyframes db-look {
        0%, 15%, 100% { transform: translate(0,0); }
        30%, 45%      { transform: translate(-1px,0); }
        60%, 75%      { transform: translate(1px,0); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
  <g class="eyes-look" fill="#1a1025">
    <circle cx="9" cy="13" r="1.8"/>
    <circle cx="17" cy="13" r="1.8"/>
  </g>
  <path d="M9 19 Q13 22 17 19" stroke="#1a1025" stroke-width="1.4" fill="none" stroke-linecap="round"/>
</svg>
