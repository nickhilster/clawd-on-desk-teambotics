<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 50%; animation: db-error-shake 0.6s ease-in-out infinite; }
      @keyframes db-error-shake {
        0%, 100% { transform: rotate(0deg); }
        25%      { transform: rotate(-2.5deg); }
        75%      { transform: rotate(2.5deg); }
      }
      .drop { animation: db-drop 2s ease-in-out infinite; }
      @keyframes db-drop {
        0%, 100% { transform: translateY(0); opacity: 0.9; }
        50%      { transform: translateY(1.5px); opacity: 1; }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <circle cx="13" cy="15" r="11" fill="#e63946" opacity="0.2"/>
    <g stroke="#1a1025" stroke-width="1.4" stroke-linecap="round">
      <line x1="7" y1="12" x2="10.5" y2="13.5" transform="rotate(-8 8.7 12.7)"/>
      <line x1="19" y1="12" x2="15.5" y2="13.5" transform="rotate(8 17.2 12.7)"/>
    </g>
    <path d="M9 20 L10.4 18.6 L11.8 20 L13.2 18.6 L14.6 20 L16 18.6" stroke="#1a1025" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path class="drop" d="M23 4 Q25.4 8 23 9.6 Q20.6 8 23 4 Z" fill="#7dd3fc"/>
</svg>
