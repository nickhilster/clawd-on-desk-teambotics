<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      .body-tilt { transform-box: fill-box; transform-origin: 50% 50%; animation: db-think-tilt 6s ease-in-out infinite; }
      @keyframes db-think-tilt {
        0%, 100% { transform: rotate(0deg); }
        50%      { transform: rotate(-3deg); }
      }
      .dot { animation: db-dot 6s ease-in-out infinite; }
      .dot2 { animation-delay: 0.6s; }
      .dot3 { animation-delay: 1.2s; }
      @keyframes db-dot {
        0%, 15%, 100% { opacity: 0; }
        20%, 80%      { opacity: 1; }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g class="body-tilt">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <ellipse cx="8" cy="12" rx="1.8" ry="1.2"/>
      <ellipse cx="16" cy="12" rx="1.8" ry="1.2"/>
    </g>
    <path d="M10 19 Q13 18 16 19" stroke="#1a1025" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- floating thought bubble, not touching the blob -->
  <circle cx="26" cy="-2" r="1.2" fill="#ffffff"/>
  <circle cx="29" cy="-5" r="1.8" fill="#ffffff"/>
  <rect x="24" y="-16" width="18" height="11" rx="5.5" fill="#ffffff"/>
  <circle class="dot" cx="28" cy="-10.5" r="1.1" fill="#7c5cff"/>
  <circle class="dot dot2" cx="33" cy="-10.5" r="1.1" fill="#7c5cff"/>
  <circle class="dot dot3" cx="38" cy="-10.5" r="1.1" fill="#7c5cff"/>
</svg>
