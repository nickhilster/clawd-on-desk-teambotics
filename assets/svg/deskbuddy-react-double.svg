<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 50%; animation: db-double-spin 0.8s ease-in-out 1; }
      @keyframes db-double-spin {
        0%   { transform: rotate(0deg) scale(1,1); }
        50%  { transform: rotate(180deg) scale(1.1,0.9); }
        100% { transform: rotate(360deg) scale(1,1); }
      }
      .burst { animation: db-burst 0.8s ease-out 1; }
      @keyframes db-burst {
        0%   { opacity: 1; transform: scale(0.3); }
        100% { opacity: 0; transform: scale(1.6); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.3"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g class="spiral" stroke="#1a1025" stroke-width="0.8" fill="none">
      <path d="M9 13 m-1.6,0 a1.6,1.6 0 1,0 3.2,0 a0.9,0.9 0 1,1 -1.8,0"/>
      <path d="M17 13 m-1.6,0 a1.6,1.6 0 1,0 3.2,0 a0.9,0.9 0 1,1 -1.8,0"/>
    </g>
    <path d="M10 19.5 Q13 22 16 19.5" stroke="#1a1025" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  </g>
  <g class="burst" fill="#ffd166">
    <circle cx="1" cy="4" r="1"/>
    <circle cx="27" cy="4" r="1"/>
    <circle cx="1" cy="26" r="1"/>
    <circle cx="27" cy="26" r="1"/>
  </g>
</svg>
