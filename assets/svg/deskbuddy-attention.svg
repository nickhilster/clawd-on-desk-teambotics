<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-happy-bob 0.8s ease-in-out infinite; }
      @keyframes db-happy-bob {
        0%, 100% { transform: scale(1, 1) translateY(0); }
        50%      { transform: scale(1.04, 1.06) translateY(-1.2px); }
      }
      .confetti { animation: db-confetti 1.6s ease-in-out infinite; }
      .confetti2 { animation-delay: 0.4s; }
      .confetti3 { animation-delay: 0.8s; }
      @keyframes db-confetti {
        0%, 100% { opacity: 0.4; transform: translateY(0); }
        50%      { opacity: 1; transform: translateY(-2px); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g stroke="#1a1025" stroke-width="1.4" fill="none" stroke-linecap="round">
      <path d="M6.5 13 Q9 10.5 11.5 13"/>
      <path d="M14.5 13 Q17 10.5 19.5 13"/>
    </g>
    <path d="M8 19 Q13 26 18 19 Q13 21.5 8 19 Z" fill="#1a1025"/>
  </g>
  <rect class="confetti" x="1" y="0" width="1.6" height="1.6" fill="#ffd166" transform="rotate(20 1.8 0.8)"/>
  <rect class="confetti confetti2" x="24" y="-2" width="1.6" height="1.6" fill="#ffd166" transform="rotate(-15 24.8 -1.2)"/>
  <circle class="confetti confetti3" cx="3" cy="10" r="1" fill="#2dd4bf"/>
</svg>
