<svg xmlns="http://www.w3.org/2000/svg" viewBox="-7 -8 28 28" width="200" height="200">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-mini-alert-perk 1s ease-out 1; }
      @keyframes db-mini-alert-perk {
        0%   { transform: translateY(1px) scale(0.96,1); }
        50%  { transform: translateY(-1px) scale(1.04,1.06); }
        100% { transform: translateY(0) scale(1,1); }
      }
      .mini-exclaim { animation: db-mini-exclaim 1s ease-out 1; }
      @keyframes db-mini-exclaim {
        0%   { opacity: 0; transform: scale(0.4); }
        50%  { opacity: 1; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
      }
    </style>
  </defs>
  <ellipse cx="7" cy="14" rx="5" ry="0.9" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="7" cy="8" r="6" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <circle cx="5" cy="7" r="1.3"/>
      <circle cx="9" cy="7" r="1.3"/>
    </g>
    <circle cx="7" cy="11" r="0.6" fill="#1a1025"/>
  </g>
  <g class="mini-exclaim" fill="#ffd166">
    <rect x="12.5" y="-6" width="1.2" height="3.5" rx="0.6"/>
    <circle cx="13.1" cy="-1.3" r="0.7"/>
  </g>
</svg>
