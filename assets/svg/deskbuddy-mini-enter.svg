<svg xmlns="http://www.w3.org/2000/svg" viewBox="-7 -8 28 28" width="200" height="200">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-mini-enter 0.6s ease-out 1; }
      @keyframes db-mini-enter {
        0%   { transform: scale(0.3,0.3) translateX(6px); opacity: 0; }
        70%  { transform: scale(1.08,1.08) translateX(0); opacity: 1; }
        100% { transform: scale(1,1) translateX(0); opacity: 1; }
      }
    </style>
  </defs>
  <ellipse cx="7" cy="14" rx="5" ry="0.9" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="7" cy="8" r="6" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <circle cx="5" cy="7" r="1"/>
      <circle cx="9" cy="7" r="1"/>
    </g>
    <path d="M5 10 Q7 11.4 9 10" stroke="#1a1025" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
