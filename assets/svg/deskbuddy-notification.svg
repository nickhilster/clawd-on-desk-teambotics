<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-notif-perk 1.2s ease-out 1; }
      @keyframes db-notif-perk {
        0%   { transform: translateY(2px) scale(0.96, 1); }
        50%  { transform: translateY(-1.5px) scale(1.03, 1.05); }
        100% { transform: translateY(0) scale(1, 1); }
      }
      .exclaim { animation: db-exclaim-pop 1.2s ease-out 1; }
      @keyframes db-exclaim-pop {
        0%   { opacity: 0; transform: scale(0.4); }
        40%  { opacity: 1; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <circle cx="9" cy="13" r="2.4"/>
      <circle cx="17" cy="13" r="2.4"/>
    </g>
    <circle cx="13" cy="20" r="1.1" fill="#1a1025"/>
  </g>
  <g class="exclaim" fill="#ffd166">
    <rect x="24" y="-12" width="2.2" height="6.5" rx="1.1"/>
    <circle cx="25.1" cy="-2.5" r="1.2"/>
  </g>
</svg>
