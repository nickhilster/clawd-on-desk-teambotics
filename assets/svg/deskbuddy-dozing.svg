<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-doze-sag 5s ease-in-out infinite; }
      @keyframes db-doze-sag {
        0%, 100% { transform: scale(1, 0.98) translateY(0.3px); }
        50%      { transform: scale(1.01, 0.97) translateY(0.5px); }
      }
      .eye-doze { transform-box: fill-box; transform-origin: 50% 50%; animation: db-doze-blink 5s ease-in-out infinite; }
      @keyframes db-doze-blink {
        0%, 80%, 100% { transform: scaleY(1); }
        90%           { transform: scaleY(0.1); }
      }
      .z-slow { animation: db-z-slow 5s ease-in-out infinite; }
      @keyframes db-z-slow {
        0%   { opacity: 0; transform: translateY(4px) scale(0.7); }
        30%  { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-8px) scale(1.05); }
      }
    </style>
  </defs>
  <ellipse id="shadow-js" cx="13" cy="27" rx="9" ry="1.4" fill="#000000" opacity="0.3"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g id="eyes-js" fill="#1a1025">
      <ellipse class="eye-doze" cx="9" cy="14" rx="1.8" ry="0.7"/>
      <ellipse class="eye-doze" cx="17" cy="14" rx="1.8" ry="0.7"/>
    </g>
    <path d="M10 20 Q13 21 16 20" stroke="#1a1025" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  </g>
  <text class="z-slow" x="24" y="4" font-size="5" font-weight="700" fill="#ffffff">z</text>
</svg>
