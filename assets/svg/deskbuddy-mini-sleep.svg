<svg xmlns="http://www.w3.org/2000/svg" viewBox="-7 -8 28 28" width="200" height="200">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-mini-sleep-breathe 4.5s ease-in-out infinite; }
      @keyframes db-mini-sleep-breathe {
        0%, 100% { transform: scale(1,0.94) translateY(0.6px); }
        50%      { transform: scale(1.01,0.95) translateY(0.4px); }
      }
      .mini-z { animation: db-mini-z 3s ease-in-out infinite; }
      @keyframes db-mini-z {
        0%   { opacity: 0; transform: translateY(3px) scale(0.7); }
        30%  { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-5px) scale(1.05); }
      }
    </style>
  </defs>
  <ellipse cx="7" cy="14" rx="4.5" ry="0.7" fill="#000000" opacity="0.3"/>
  <g id="body-js">
    <circle cx="7" cy="9" r="6" fill="url(#db-gradient)"/>
    <circle cx="7" cy="9" r="6" fill="#1e3a8a" opacity="0.25"/>
    <g stroke="#1a1025" stroke-width="0.7" fill="none" stroke-linecap="round">
      <path d="M4 8 Q5 9 6 8"/>
      <path d="M8 8 Q9 9 10 8"/>
    </g>
  </g>
  <text class="mini-z" x="12" y="2" font-size="3" font-weight="700" fill="#c7d2fe">z</text>
</svg>
