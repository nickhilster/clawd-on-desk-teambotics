<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 50%; animation: db-annoyed-wobble 0.5s ease-in-out 3; }
      @keyframes db-annoyed-wobble {
        0%, 100% { transform: rotate(0deg); }
        50%      { transform: rotate(-3deg); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g stroke="#1a1025" stroke-width="1.3" stroke-linecap="round">
      <line x1="7" y1="12.5" x2="10.5" y2="13" transform="rotate(6 8.7 12.7)"/>
      <line x1="19" y1="12.5" x2="15.5" y2="13" transform="rotate(-6 17.2 12.7)"/>
    </g>
    <line x1="9.5" y1="20" x2="16.5" y2="20" stroke="#1a1025" stroke-width="1.3" stroke-linecap="round"/>
  </g>
</svg>
