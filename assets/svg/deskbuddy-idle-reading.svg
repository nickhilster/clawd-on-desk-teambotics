<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      .eyes-read { transform-box: fill-box; transform-origin: 50% 50%; animation: db-read 7s ease-in-out infinite; }
      @keyframes db-read {
        0%, 10%, 100% { transform: translate(0,0.6px); }
        50%           { transform: translate(0,-0.2px); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
  <g class="eyes-read" fill="#1a1025">
    <ellipse cx="9" cy="13" rx="1.8" ry="1.4"/>
    <ellipse cx="17" cy="13" rx="1.8" ry="1.4"/>
  </g>
  <path d="M10 19 Q13 20.5 16 19" stroke="#1a1025" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <g transform="translate(24,10)">
    <rect x="0" y="0" width="9" height="7" fill="#ffffff" opacity="0.95"/>
    <line x1="1.2" y1="2" x2="7.8" y2="2" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="1.2" y1="3.6" x2="7.8" y2="3.6" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="1.2" y1="5.2" x2="6" y2="5.2" stroke="#a78bfa" stroke-width="0.5"/>
  </g>
</svg>
