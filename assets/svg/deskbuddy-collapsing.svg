<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-collapse 2.4s ease-in 1 forwards; }
      @keyframes db-collapse {
        0%   { transform: scale(1, 1) translateY(0); }
        40%  { transform: scale(1.03, 0.9) translateY(1px); }
        70%  { transform: scale(1.06, 0.78) translateY(2px); }
        100% { transform: scale(1.08, 0.7) translateY(2.6px); }
      }
      .eye-close { transform-box: fill-box; transform-origin: 50% 50%; animation: db-eye-close 2.4s ease-in 1 forwards; }
      @keyframes db-eye-close {
        0%   { transform: scaleY(1); }
        100% { transform: scaleY(0.1); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.4" fill="#000000" opacity="0.32"/>
  <g id="body-js">
    <circle cx="13" cy="16" r="11" fill="url(#db-gradient)"/>
    <g class="eye-close" fill="#1a1025">
      <circle cx="9" cy="14" r="1.8"/>
      <circle cx="17" cy="14" r="1.8"/>
    </g>
    <path d="M10 21 Q13 22 16 21" stroke="#1a1025" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  </g>
</svg>
