<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-wake-perk 1.5s ease-out 1; }
      @keyframes db-wake-perk {
        0%   { transform: scale(1.05, 0.85) translateY(2px); }
        60%  { transform: scale(0.98, 1.05) translateY(-0.5px); }
        100% { transform: scale(1, 1) translateY(0); }
      }
      .eye-open { transform-box: fill-box; transform-origin: 50% 50%; animation: db-eye-open 1.5s ease-out 1; }
      @keyframes db-eye-open {
        0%   { transform: scaleY(0.1); }
        60%  { transform: scaleY(1.15); }
        100% { transform: scaleY(1); }
      }
      .z-fade { animation: db-z-fade 1.5s ease-out 1; }
      @keyframes db-z-fade {
        0%   { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0.4) translateY(-4px); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g class="eye-open" fill="#1a1025">
      <circle cx="9" cy="13" r="1.8"/>
      <circle cx="17" cy="13" r="1.8"/>
    </g>
    <path d="M9 19 Q13 22 17 19" stroke="#1a1025" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </g>
  <text class="z-fade" x="26" y="2" font-size="6" font-weight="700" fill="#ffffff">Z</text>
</svg>
