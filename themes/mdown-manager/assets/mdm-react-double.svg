<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .flail { animation: kf-flail 0.45s infinite ease-in-out; }
    @keyframes kf-flail { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    .paper-orbit { animation: kf-porb 1s infinite linear; }
    @keyframes kf-porb { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .star-spin { animation: kf-star 2.2s infinite linear; }
    @keyframes kf-star { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style></defs>
<g class="flail" style="transform-origin:7.5px 10px">
  <ellipse id="mdm_shadow" cx="7.5" cy="15.3" rx="6.2" ry="1.3" fill="#0f172a" opacity="0.16"/>
  <g id="mdm_legs_group" fill="#0f172a"><rect x="3.4" y="10" width="2.6" height="4.2" rx="1"/><rect x="9" y="10" width="2.6" height="4.2" rx="1"/></g>
  <g id="body-js"><g class="breathe" style="transform-origin:7.5px 6px">
    <rect id="mdm_body" x="2" y="2" width="11" height="8.4" rx="1.6" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_tie" d="M7 2.4 L8.3 2.4 L9 5 L7.5 9.6 L6 5 Z" fill="#1d4ed8"/>
    <rect x="10" y="3.4" width="2" height="2.4" rx="0.3" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.25"/>
    <rect x="10.7" y="3" width="0.55" height="1.2" rx="0.2" fill="#dc2626"/></g>
  </g>
    <rect id="mdm_head_document" x="1" y="-9" width="13" height="11" rx="2.4" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_corner_fold" d="M11.6 -9 L14 -9 L14 -6.6 Z" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.3"/>
    <g class="badge-pulse">
      <rect id="mdm_badge" x="2.1" y="-8.1" width="3.6" height="3.6" rx="0.6" fill="#1d4ed8"/>
      <path d="M2.9 -5.3 V-7.4 L3.9 -6.1 L4.9 -7.4 V-5.3" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="mdm_brows_group"><path d="M3.4 -6.7 q1.6 -1 3 -0.2" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/>
         <path d="M8.6 -6.9 q1.6 0.8 3 -0.1" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    <g id="eyes-js"><g class="blink" style="transform-origin:7.5px -3.5px"><g id="mdm_eyes_group">
    <ellipse cx="5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/>
    <ellipse cx="10.5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/><circle cx="5" cy="-3.3" r="0.5" fill="#0f172a"/><circle cx="10.5" cy="-3.3" r="0.5" fill="#0f172a"/></g></g></g>
    <g id="mdm_mouth_group"><ellipse cx="7.5" cy="-0.9" rx="1.1" ry="0.7" fill="#dc2626"/></g>
    <path id="mdm_left_arm" d="M2 3.5 Q-2.8 1.9 -2 0.4" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_left_hand" cx="-2" cy="0.4" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/><path id="mdm_right_arm" d="M13 3.5 Q17.8 1.9 17 0.4" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_right_hand" cx="17" cy="0.4" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/></g>
<g class="paper-orbit" style="transform-origin: 7.5px 1px"><g transform="translate(7.5,-8.6)"><rect x="-1.3" y="-0.9" width="2.6" height="1.8" rx="0.15" fill="#f4f8ff" stroke="#0f172a" stroke-width="0.22"/></g></g>
   <g class="paper-orbit" style="transform-origin: 7.5px 1px; animation-delay: -0.33s"><g transform="translate(7.5,-8.6)"><rect x="-1.1" y="-0.8" width="2.2" height="1.6" rx="0.15" fill="#f4f8ff" stroke="#0f172a" stroke-width="0.22"/></g></g>
   <g class="paper-orbit" style="transform-origin: 7.5px 1px; animation-delay: -0.66s"><g transform="translate(7.5,-8.6)"><rect x="-1.2" y="-0.85" width="2.4" height="1.7" rx="0.15" fill="#f4f8ff" stroke="#0f172a" stroke-width="0.22"/></g></g>
   <g class="star-spin" style="transform-origin: 7.5px -11px">
     <text x="4" y="-10" font-size="2" fill="#f2b632" font-family="Arial, sans-serif">★</text>
     <text x="9.5" y="-11.5" font-size="1.6" fill="#f2b632" font-family="Arial, sans-serif">★</text>
   </g>
</svg>
