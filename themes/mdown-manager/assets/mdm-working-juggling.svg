<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .orbit { animation: kf-orbit 1.8s infinite linear; }
    @keyframes kf-orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .arm-jl { animation: kf-jl 0.9s infinite ease-in-out; }
    @keyframes kf-jl { 0%,100% { transform: rotate(-16deg); } 50% { transform: rotate(14deg); } }
    .arm-jr { animation: kf-jl 0.9s infinite ease-in-out; animation-delay: -0.45s; }
    .eye-track { animation: kf-track 0.9s infinite ease-in-out; }
    @keyframes kf-track { 0%,100% { transform: translateY(-0.5px); } 50% { transform: translateY(0.25px); } }
    .head-sway { animation: kf-hsway 1.8s infinite ease-in-out; }
    @keyframes kf-hsway { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
  </style></defs>

  <ellipse id="mdm_shadow" cx="7.5" cy="15.3" rx="6.2" ry="1.3" fill="#0f172a" opacity="0.16"/>
  <g id="mdm_legs_group" fill="#0f172a"><rect x="3.4" y="10" width="2.6" height="4.2" rx="1"/><rect x="9" y="10" width="2.6" height="4.2" rx="1"/></g>
  <g id="body-js"><g class="breathe" style="transform-origin:7.5px 6px">
    <rect id="mdm_body" x="2" y="2" width="11" height="8.4" rx="1.6" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_tie" d="M7 2.4 L8.3 2.4 L9 5 L7.5 9.6 L6 5 Z" fill="#1d4ed8"/>
    <rect x="10" y="3.4" width="2" height="2.4" rx="0.3" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.25"/>
    <rect x="10.7" y="3" width="0.55" height="1.2" rx="0.2" fill="#dc2626"/></g>
  </g>
<g class="head-sway" style="transform-origin:7.5px 0px">
    <rect id="mdm_head_document" x="1" y="-9" width="13" height="11" rx="2.4" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_corner_fold" d="M11.6 -9 L14 -9 L14 -6.6 Z" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.3"/>
    <g class="badge-pulse">
      <rect id="mdm_badge" x="2.1" y="-8.1" width="3.6" height="3.6" rx="0.6" fill="#1d4ed8"/>
      <path d="M2.9 -5.3 V-7.4 L3.9 -6.1 L4.9 -7.4 V-5.3" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="mdm_brows_group"><path d="M3.4 -7.4 q1.6 -0.6 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/>
         <path d="M8.6 -7.4 q1.6 -0.6 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    <g id="eyes-js"><g class="blink" style="transform-origin:7.5px -3.5px"><g id="mdm_eyes_group">
    <ellipse cx="5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/>
    <ellipse cx="10.5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/><g class="eye-track" style="transform-origin:7.75px -3.8px"><circle cx="4.7" cy="-4.4" r="0.5" fill="#0f172a"/><circle cx="10.2" cy="-4.4" r="0.5" fill="#0f172a"/></g></g></g></g>
    <g id="mdm_mouth_group"><ellipse cx="7.5" cy="-0.9" rx="1.1" ry="0.7" fill="#dc2626"/></g>
    </g>
<g class="arm-jl" style="transform-origin:2px 3.5px"><path id="mdm_left_arm" d="M2 3.5 Q-1.1 1.9 1 0.2" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_left_hand" cx="1" cy="0.2" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/></g>
<g class="arm-jr" style="transform-origin:13px 3.5px"><path id="mdm_right_arm" d="M13 3.5 Q16.1 1.9 14 0.2" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_right_hand" cx="14" cy="0.2" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/></g>
<g class="orbit" style="transform-origin: 7.5px -13px; animation-delay: 0s"><g transform="translate(7.5,-18.5)"><g transform="translate(-1.5,-1.2) scale(0.62)"><rect x="0" y="0" width="4.4" height="5.6" rx="0.5" fill="#f4f8ff" stroke="#0f172a" stroke-width="0.45"/><rect x="1.4" y="-0.7" width="1.6" height="1.1" rx="0.25" fill="#0f172a"/><path d="M0.8 1.6 l1 1 2 -2.3" stroke="#16a34a" stroke-width="0.65" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g></g></g>
<g class="orbit" style="transform-origin: 7.5px -13px; animation-delay: -0.6s"><g transform="translate(7.5,-18.5)"><g transform="translate(-1.4,-1) scale(0.7)">
  <path d="M0 0 h3.4 l-0.35 4 a1.5 1.5 0 0 1 -1.5 1.3 a1.5 1.5 0 0 1 -1.5 -1.3 Z" fill="#f4f8ff" stroke="#0f172a" stroke-width="0.35"/>
  <path d="M3.2 0.6 q1.5 0 1.3 1.5 q-0.2 1.3 -1.5 1.1" fill="none" stroke="#0f172a" stroke-width="0.38"/>
  <rect x="0.3" y="0" width="2.8" height="0.85" fill="#1d4ed8"/></g></g></g>
<g class="orbit" style="transform-origin: 7.5px -13px; animation-delay: -1.2s"><g transform="translate(7.5,-18.5)"><g transform="translate(-2.4,-0.6) scale(0.72)"><rect x="0" y="0" width="6.6" height="1.7" rx="0.3" fill="#1d4ed8" stroke="#0f172a" stroke-width="0.28"/><rect x="5.199999999999999" y="0.45" width="0.9" height="0.8" rx="0.15" fill="#ffffff" opacity="0.85"/></g></g></g>
</svg>
