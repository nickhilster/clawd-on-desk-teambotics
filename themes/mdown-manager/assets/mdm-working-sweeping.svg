      <g transform="translate(-0.2,-3.8)"><rect x="0" y="0" width="9.8" height="1.7" rx="0.3" fill="#1d4ed8" stroke="#0f172a" stroke-width="0.28"/><rect x="8.4" y="0.45" width="0.9" height="0.8" rx="0.15" fill="#ffffff" opacity="0.85"/></g>
