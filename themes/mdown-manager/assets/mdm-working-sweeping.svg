      <g transform="translate(0.1,-7.6)"><g class="top-teeter" style="transform-origin:4.6px 1.7px"><rect x="0" y="0" width="9.4" height="1.7" rx="0.3" fill="#f2b632" stroke="#0f172a" stroke-width="0.28"/><rect x="8" y="0.45" width="0.9" height="0.8" rx="0.15" fill="#ffffff" opacity="0.85"/></g></g></g></g><g transform="translate(11,-2.4)"><g class="flutter"><rect x="0" y="0" width="2.6" height="1.8" rx="0.15" fill="#f4f8ff" stroke="#0f172a" stroke-width="0.22"/></g></g></g>
