<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .stack-sway { animation: kf-ssway 2.6s infinite ease-in-out; }
    @keyframes kf-ssway { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
    .top-teeter { animation: kf-teeter 2.6s infinite ease-in-out; animation-delay: -0.3s; }
    @keyframes kf-teeter { 0%,100% { transform: rotate(-4.5deg); } 50% { transform: rotate(4.5deg); } }
    .stagger { animation: kf-stag 3.4s infinite ease-in-out; }
    @keyframes kf-stag { 0%,100% { transform: translateX(-0.7px); } 50% { transform: translateX(0.7px); } }
    .sweat-fall { animation: kf-sw 1.8s infinite ease-in; }
    @keyframes kf-sw { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 0.9; } 80% { transform: translateY(4px); opacity: 0.9; } 100% { transform: translateY(5px); opacity: 0; } }
    .flutter { animation: kf-flut 4s infinite; }
    @keyframes kf-flut { 0%,8% { transform: translate(0,0) rotate(0deg); opacity: 0; } 12% { opacity: 1; } 30% { transform: translate(4px,5px) rotate(38deg); } 50% { transform: translate(7px,11px) rotate(62deg); opacity: 1; } 62% { transform: translate(9px,15px) rotate(80deg); opacity: 0; } 100% { opacity: 0; } }
  </style></defs>
<g class="stagger" style="transform-origin:7.5px 10px">
