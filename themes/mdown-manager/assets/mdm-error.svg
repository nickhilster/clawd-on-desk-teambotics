<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .alert-ring { animation: kf-ring 1.6s infinite ease-out; }
    @keyframes kf-ring { 0% { transform: scale(0.82); opacity: 0.5; } 70% { transform: scale(1.12); opacity: 0; } 100% { opacity: 0; } }
    .sign-wobble { animation: kf-wob 1.1s infinite ease-in-out; }
    @keyframes kf-wob { 0%,100% { transform: rotate(-3.5deg); } 50% { transform: rotate(3.5deg); } }
    .drop1 { animation: kf-drop 1.7s infinite ease-in; }
    .drop2 { animation: kf-drop 1.7s infinite ease-in; animation-delay: -0.85s; }
    @keyframes kf-drop { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 0.9; } 75% { transform: translateY(4.5px); opacity: 0.9; } 100% { transform: translateY(5.5px); opacity: 0; } }
    .eye-dart { animation: kf-dart 1.6s infinite ease-in-out; }
    @keyframes kf-dart { 0%,100% { transform: translateX(-0.45px); } 50% { transform: translateX(0.45px); } }
  </style></defs>
<g class="alert-ring" style="transform-origin:7.5px -1px"><circle cx="7.5" cy="-1" r="10.5" fill="none" stroke="#dc2626" stroke-width="0.7"/></g>
<g fill="#f4f8ff" stroke="#0f172a" stroke-width="0.25">
    <rect x="-4" y="12.6" width="3.6" height="2.4" rx="0.2" transform="rotate(-14 -2.2 13.8)"/>
    <rect x="15" y="13" width="3.4" height="2.3" rx="0.2" transform="rotate(11 16.7 14.1)"/>
    <rect x="-1" y="14" width="3" height="2" rx="0.2" transform="rotate(24 0.5 15)"/>
  </g>

  <ellipse id="mdm_shadow" cx="7.5" cy="15.3" rx="6.2" ry="1.3" fill="#0f172a" opacity="0.16"/>
  <g id="mdm_legs_group" fill="#0f172a"><rect x="3.4" y="10" width="2.6" height="4.2" rx="1"/><rect x="9" y="10" width="2.6" height="4.2" rx="1"/></g>
  <g id="body-js"><g class="breathe" style="transform-origin:7.5px 6px">
    <rect id="mdm_body" x="2" y="2" width="11" height="8.4" rx="1.6" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_tie" d="M7 2.4 L8.3 2.4 L9 5 L7.5 9.6 L6 5 Z" fill="#1d4ed8"/>
    <rect x="10" y="3.4" width="2" height="2.4" rx="0.3" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.25"/>
    <rect x="10.7" y="3" width="0.55" height="1.2" rx="0.2" fill="#dc2626"/></g>
  </g>

    <rect id="mdm_head_document" x="1" y="-9" width="13" height="11" rx="2.4" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_corner_fold" d="M11.6 -9 L14 -9 L14 -6.6 Z" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.3"/>
    <g class="badge-pulse">
      <rect id="mdm_badge" x="2.1" y="-8.1" width="3.6" height="3.6" rx="0.6" fill="#1d4ed8"/>
      <path d="M2.9 -5.3 V-7.4 L3.9 -6.1 L4.9 -7.4 V-5.3" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="mdm_brows_group"><path d="M3.4 -6.7 q1.6 -1 3 -0.2" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/>
         <path d="M8.6 -6.9 q1.6 0.8 3 -0.1" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    <g id="eyes-js"><g class="blink" style="transform-origin:7.5px -3.5px"><g id="mdm_eyes_group">
    <ellipse cx="5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/>
    <ellipse cx="10.5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/><g class="eye-dart" style="transform-origin:7.75px -3.8px"><circle cx="5" cy="-3.3" r="0.5" fill="#0f172a"/><circle cx="10.5" cy="-3.3" r="0.5" fill="#0f172a"/></g></g></g></g>
    <g id="mdm_mouth_group"><path d="M6 -1 q1.5 -0.8 3 0" stroke="#dc2626" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    
<g class="drop1"><path d="M0.6 -7.4 q0.8 1.2 0 2 q-0.8 -0.28 -0.8 -1 q0 -0.65 0.8 -1 z" fill="#38bdf8"/></g>
   <g class="drop2"><path d="M14.6 -7 q0.8 1.2 0 2 q-0.8 -0.28 -0.8 -1 q0 -0.65 0.8 -1 z" fill="#38bdf8"/></g>
<path id="mdm_left_arm" d="M2 3.5 Q1.6 2.5 4.4 1.4" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_left_hand" cx="4.4" cy="1.4" r="0.75" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
<path id="mdm_right_arm" d="M13 3.5 Q13.4 2.5 10.6 1.4" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_right_hand" cx="10.6" cy="1.4" r="0.75" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
<g transform="translate(7.5,-4.2)"><g class="sign-wobble" style="transform-origin:0px 5.4px">
    <path d="M0.4 9 L-4.2 -0.2 L5 -0.2 Z" fill="#0f172a" opacity="0.14"/>
    <path d="M0 8.6 L-4.6 -0.6 L4.6 -0.6 Z" fill="#f2b632" stroke="#0f172a" stroke-width="0.4" stroke-linejoin="round"/>
    <rect x="-0.4" y="2.2" width="0.8" height="3" fill="#0f172a"/>
    <rect x="-0.4" y="5.8" width="0.8" height="0.9" fill="#0f172a"/></g></g>
</svg>
