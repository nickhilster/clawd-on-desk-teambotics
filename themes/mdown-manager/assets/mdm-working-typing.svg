<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .type-bounce { animation: kf-tb 0.35s infinite ease-in-out; }
    @keyframes kf-tb { 0%,100% { transform: translateY(0); } 50% { transform: translateY(0.5px); } }
    .arm-tl { animation: kf-atl 0.16s infinite ease-in-out; }
    @keyframes kf-atl { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(6deg); } }
    .arm-tr { animation: kf-atr 0.13s infinite ease-in-out; }
    @keyframes kf-atr { 0%,100% { transform: rotate(3deg); } 50% { transform: rotate(-6deg); } }
    .md1 { animation: kf-md1 7s infinite; }
    .md2 { animation: kf-md2 7s infinite; }
    .md3 { animation: kf-md3 7s infinite; }
    .md4 { animation: kf-md4 7s infinite; }
    @keyframes kf-md1 { 0% { transform: scaleX(0); opacity: 0; } 3% { transform: scaleX(0); opacity: 1; } 13% { transform: scaleX(1); opacity: 1; } 78% { transform: scaleX(1) translateY(0); opacity: 1; } 88% { transform: scaleX(1) translateY(-3px); opacity: 0; } 89%,100% { transform: scaleX(0); opacity: 0; } }
    @keyframes kf-md2 { 0%,14% { transform: scaleX(0); opacity: 0; } 15% { transform: scaleX(0); opacity: 1; } 27% { transform: scaleX(1); opacity: 1; } 81% { transform: scaleX(1) translateY(0); opacity: 1; } 90% { transform: scaleX(1) translateY(-3px); opacity: 0; } 91%,100% { transform: scaleX(0); opacity: 0; } }
    @keyframes kf-md3 { 0%,29% { transform: scaleX(0); opacity: 0; } 30% { transform: scaleX(0); opacity: 1; } 42% { transform: scaleX(1); opacity: 1; } 84% { transform: scaleX(1) translateY(0); opacity: 1; } 92% { transform: scaleX(1) translateY(-3px); opacity: 0; } 93%,100% { transform: scaleX(0); opacity: 0; } }
    @keyframes kf-md4 { 0%,44% { transform: scaleX(0); opacity: 0; } 45% { transform: scaleX(0); opacity: 1; } 57% { transform: scaleX(1); opacity: 1; } 87% { transform: scaleX(1) translateY(0); opacity: 1; } 94% { transform: scaleX(1) translateY(-3px); opacity: 0; } 95%,100% { transform: scaleX(0); opacity: 0; } }
    .cursor { animation: kf-cur 0.9s infinite; }
    @keyframes kf-cur { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    .kf1 { animation: kf-key 0.6s infinite; }
    .kf2 { animation: kf-key 0.8s infinite; animation-delay: -0.25s; }
    .kf3 { animation: kf-key 0.5s infinite; animation-delay: -0.1s; }
    .kf4 { animation: kf-key 0.7s infinite; animation-delay: -0.45s; }
    @keyframes kf-key { 0%,70%,100% { opacity: 0; } 35% { opacity: 0.9; } }
    .glyph1 { animation: kf-gl 2.4s infinite linear; }
    .glyph2 { animation: kf-gl 2.4s infinite linear; animation-delay: -0.8s; }
    .glyph3 { animation: kf-gl 2.4s infinite linear; animation-delay: -1.6s; }
    @keyframes kf-gl { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 0.6; } 100% { transform: translateY(-11px); opacity: 0; } }
    .eye-scan { animation: kf-scan 8s infinite ease-in-out; }
    @keyframes kf-scan { 0%,20% { transform: translate(0,0.6px); } 25% { transform: translate(-0.6px,0.6px); } 45% { transform: translate(0.6px,0.6px); } 50% { transform: translate(-0.6px,0.6px); } 70% { transform: translate(0.6px,0.6px); } 75%,100% { transform: translate(0,0.6px); } }
  </style></defs>
