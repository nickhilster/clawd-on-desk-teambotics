<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .sip-arm { animation: kf-sip 6.5s infinite ease-in-out; }
    @keyframes kf-sip { 0%,18% { transform: translate(0,0) rotate(0deg); } 32%,52% { transform: translate(-4.5px,-6.5px) rotate(-12deg); } 66%,100% { transform: translate(0,0) rotate(0deg); } }
    .sip-head { animation: kf-siphead 6.5s infinite ease-in-out; }
    @keyframes kf-siphead { 0%,30% { transform: rotate(0deg); } 38%,50% { transform: rotate(-4deg); } 60%,100% { transform: rotate(0deg); } }
    .steam1 { animation: kf-steam2 2.8s infinite ease-in-out; }
    .steam2 { animation: kf-steam2 2.8s infinite ease-in-out; animation-delay: -1.4s; }
    @keyframes kf-steam2 { 0% { transform: translateY(0); opacity: 0; } 30% { opacity: 0.85; } 100% { transform: translateY(-2.2px); opacity: 0; } }
  </style></defs>

  <ellipse id="mdm_shadow" cx="7.5" cy="15.3" rx="6.2" ry="1.3" fill="#0f172a" opacity="0.16"/>
  <g id="mdm_legs_group" fill="#0f172a"><rect x="3.4" y="10" width="2.6" height="4.2" rx="1"/><rect x="9" y="10" width="2.6" height="4.2" rx="1"/></g>
  <g id="body-js"><g class="breathe" style="transform-origin:7.5px 6px">
    <rect id="mdm_body" x="2" y="2" width="11" height="8.4" rx="1.6" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_tie" d="M7 2.4 L8.3 2.4 L9 5 L7.5 9.6 L6 5 Z" fill="#1d4ed8"/>
    <rect x="10" y="3.4" width="2" height="2.4" rx="0.3" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.25"/>
    <rect x="10.7" y="3" width="0.55" height="1.2" rx="0.2" fill="#dc2626"/></g>
  </g>
<path id="mdm_left_arm" d="M2 3.5 Q-1.2 6.0 -1.2 8.6" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_left_hand" cx="-1.2" cy="8.6" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
<g class="sip-arm" style="transform-origin:13px 3.5px"><path id="mdm_right_arm" d="M13 3.5 Q15.4 4.8 14.6 6.2" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_right_hand" cx="14.6" cy="6.2" r="0.8" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/><g transform="translate(13.2,3.6)">
  <path d="M0 0 h3.4 l-0.35 4 a1.5 1.5 0 0 1 -1.5 1.3 a1.5 1.5 0 0 1 -1.5 -1.3 Z" fill="#f4f8ff" stroke="#0f172a" stroke-width="0.35"/>
  <path d="M3.2 0.6 q1.5 0 1.3 1.5 q-0.2 1.3 -1.5 1.1" fill="none" stroke="#0f172a" stroke-width="0.38"/>
  <rect x="0.3" y="0" width="2.8" height="0.85" fill="#1d4ed8"/>
  <g class="steam1" style="transform-origin:1px -1px"><path d="M1 -0.5 q0.5 -1 0 -1.9 q-0.5 -0.8 0.2 -1.6" stroke="#38bdf8" stroke-width="0.4" fill="none" stroke-linecap="round"/></g>
  <g class="steam2" style="transform-origin:2.2px -1px"><path d="M2.2 -0.5 q0.5 -1 0 -1.9 q-0.5 -0.8 0.2 -1.6" stroke="#38bdf8" stroke-width="0.4" fill="none" stroke-linecap="round"/></g></g></g>
<g class="sip-head" style="transform-origin:7.5px 0px">
    <rect id="mdm_head_document" x="1" y="-9" width="13" height="11" rx="2.4" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_corner_fold" d="M11.6 -9 L14 -9 L14 -6.6 Z" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.3"/>
    <g class="badge-pulse">
      <rect id="mdm_badge" x="2.1" y="-8.1" width="3.6" height="3.6" rx="0.6" fill="#1d4ed8"/>
      <path d="M2.9 -5.3 V-7.4 L3.9 -6.1 L4.9 -7.4 V-5.3" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="mdm_brows_group"><path d="M3.4 -6.9 q1.6 -0.4 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/>
         <path d="M8.6 -6.9 q1.6 -0.4 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    <g id="eyes-js"><g class="blink" style="transform-origin:7.5px -3.5px"><g id="mdm_eyes_group"><path d="M4 -4 q1 0.8 2 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/>
       <path d="M9.5 -4 q1 0.8 2 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/></g></g></g>
    <g id="mdm_mouth_group"><path d="M6.2 -0.9 h2.6" stroke="#dc2626" stroke-width="0.6" stroke-linecap="round"/></g>
    </g>
</svg>
