<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .build-bounce { animation: kf-bb 0.5s infinite ease-in-out; }
    @keyframes kf-bb { 0%,100% { transform: translateY(0); } 50% { transform: translateY(0.6px); } }
    .lift { animation: kf-lift 2.2s infinite; }
    @keyframes kf-lift { 0%,8% { transform: translate(0,0); opacity: 1; } 45% { transform: translate(8.5px,-9px); opacity: 1; } 55% { transform: translate(10.5px,-11.4px); opacity: 1; } 60% { transform: translate(10.5px,-11.4px); opacity: 0; } 96% { transform: translate(0,0); opacity: 0; } 100% { opacity: 1; } }
    .place-blink { animation: kf-place 2.2s infinite; }
    @keyframes kf-place { 0%,55% { opacity: 0; } 60%,90% { opacity: 1; } 94%,100% { opacity: 0; } }
    .sweat-fall { animation: kf-sw2 1.4s infinite ease-in; }
    @keyframes kf-sw2 { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 0.9; } 80% { transform: translateY(3.6px); opacity: 0.9; } 100% { opacity: 0; } }
    .lift-arm { animation: kf-larm 2.2s infinite ease-in-out; }
    @keyframes kf-larm { 0%,8% { transform: rotate(0deg); } 45% { transform: rotate(-58deg); } 70%,100% { transform: rotate(0deg); } }
  </style></defs>
