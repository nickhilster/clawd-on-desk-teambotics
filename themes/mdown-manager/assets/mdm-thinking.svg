<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .pencil-tap { animation: kf-tap 1.1s infinite ease-in-out; }
    @keyframes kf-tap { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-9deg); } }
    .thought1, .thought2, .thought3 { opacity: 0; }
    .thought1 { animation: kf-th 6s infinite; }
    .thought2 { animation: kf-th 6s infinite; animation-delay: -4s; }
    .thought3 { animation: kf-th 6s infinite; animation-delay: -2s; }
    @keyframes kf-th { 0%,30% { opacity: 0; } 34%,60% { opacity: 1; } 64%,100% { opacity: 0; } }
    .dot-pulse1 { animation: kf-dot 2s infinite ease-in-out; }
    .dot-pulse2 { animation: kf-dot 2s infinite ease-in-out; animation-delay: -1s; }
    @keyframes kf-dot { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
  </style></defs>

  <ellipse id="mdm_shadow" cx="7.5" cy="15.3" rx="6.2" ry="1.3" fill="#0f172a" opacity="0.16"/>
  <g id="mdm_legs_group" fill="#0f172a"><rect x="3.4" y="10" width="2.6" height="4.2" rx="1"/><rect x="9" y="10" width="2.6" height="4.2" rx="1"/></g>
  <g id="body-js"><g class="breathe" style="transform-origin:7.5px 6px">
    <rect id="mdm_body" x="2" y="2" width="11" height="8.4" rx="1.6" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_tie" d="M7 2.4 L8.3 2.4 L9 5 L7.5 9.6 L6 5 Z" fill="#1d4ed8"/>
    <rect x="10" y="3.4" width="2" height="2.4" rx="0.3" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.25"/>
    <rect x="10.7" y="3" width="0.55" height="1.2" rx="0.2" fill="#dc2626"/></g>
  </g>
<path id="mdm_left_arm" d="M2 3.5 Q-1.2 6.0 -1.2 8.6" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_left_hand" cx="-1.2" cy="8.6" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
<path id="mdm_right_arm" d="M13 3.5 Q15.7 1.9 13.6 0.4" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_right_hand" cx="13.6" cy="0.4" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>

    <rect id="mdm_head_document" x="1" y="-9" width="13" height="11" rx="2.4" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_corner_fold" d="M11.6 -9 L14 -9 L14 -6.6 Z" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.3"/>
    <g class="badge-pulse">
      <rect id="mdm_badge" x="2.1" y="-8.1" width="3.6" height="3.6" rx="0.6" fill="#1d4ed8"/>
      <path d="M2.9 -5.3 V-7.4 L3.9 -6.1 L4.9 -7.4 V-5.3" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="mdm_brows_group"><path d="M3.4 -7.4 q1.6 -0.6 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/>
         <path d="M8.6 -7.4 q1.6 -0.6 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    <g id="eyes-js"><g class="blink" style="transform-origin:7.5px -3.5px"><g id="mdm_eyes_group">
    <ellipse cx="5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/>
    <ellipse cx="10.5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/><circle cx="4.7" cy="-4.4" r="0.5" fill="#0f172a"/><circle cx="10.2" cy="-4.4" r="0.5" fill="#0f172a"/></g></g></g>
    <g id="mdm_mouth_group"><path d="M6.2 -0.9 h2.6" stroke="#dc2626" stroke-width="0.6" stroke-linecap="round"/></g>
    
<g transform="translate(13.4,0.2)"><g class="pencil-tap" style="transform-origin:0px 0.4px"><rect x="-0.4" y="-3.4" width="0.8" height="3.6" rx="0.2" fill="#f2b632" stroke="#0f172a" stroke-width="0.22" transform="rotate(24)"/>
     <path d="M1 -3.9 l0.9 0.4 -0.5 0.85 z" fill="#0f172a"/></g></g>
<circle class="dot-pulse1" cx="14.6" cy="-9.6" r="0.55" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
   <circle class="dot-pulse2" cx="16.4" cy="-12.2" r="0.8" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
   <ellipse cx="20.5" cy="-16.5" rx="5.6" ry="3.9" fill="#ffffff" stroke="#0f172a" stroke-width="0.38"/>
   <text class="thought1" x="20.5" y="-15.4" font-size="3" fill="#1d4ed8" text-anchor="middle" font-family="Consolas, monospace" font-weight="bold">#</text>
   <text class="thought2" x="20.5" y="-15.5" font-size="2.2" fill="#16a34a" text-anchor="middle" font-family="Consolas, monospace" font-weight="bold">[x]</text>
   <text class="thought3" x="20.5" y="-15.5" font-size="2.2" fill="#0f172a" text-anchor="middle" font-family="Consolas, monospace" font-weight="bold">**b**</text>
</svg>
