<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .foot-tap { animation: kf-tap2 0.6s infinite; }
    @keyframes kf-tap2 { 0%,100% { transform: rotate(0deg); } 40% { transform: rotate(-13deg); } 55% { transform: rotate(0deg); } }
    .sweat-fall { animation: kf-sw3 2.6s infinite ease-in; }
    @keyframes kf-sw3 { 0% { transform: translateY(0); opacity: 0; } 25% { opacity: 0.85; } 85% { transform: translateY(3.4px); opacity: 0.85; } 100% { opacity: 0; } }
    .huff { animation: kf-huff 2.6s infinite; }
    @keyframes kf-huff { 0%,55% { transform: translateX(0); opacity: 0; } 60% { opacity: 0.6; } 80% { transform: translateX(2.6px); opacity: 0; } 100% { opacity: 0; } }
  </style></defs>
<ellipse cx="7.5" cy="15.3" rx="6.2" ry="1.3" fill="#0f172a" opacity="0.16"/>
   <g id="mdm_legs_group" fill="#0f172a">
     <rect x="3.4" y="10" width="2.6" height="4.2" rx="1"/>
     <g class="foot-tap" style="transform-origin:10.3px 10.4px"><rect x="9" y="10" width="2.6" height="4.2" rx="1"/></g>
   </g>
   <g id="body-js"><g class="breathe" style="transform-origin:7.5px 6px">
     <rect id="mdm_body" x="2" y="2" width="11" height="8.4" rx="1.6" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
     <path id="mdm_tie" d="M7 2.4 L8.3 2.4 L9 5 L7.5 9.6 L6 5 Z" fill="#1d4ed8"/>
     <rect x="10" y="3.4" width="2" height="2.4" rx="0.3" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.25"/></g>
   </g>
<path id="mdm_left_arm" d="M2 3.5 Q-1.2 6.0 -1.2 8.6" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_left_hand" cx="-1.2" cy="8.6" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
<path id="mdm_right_arm" d="M13 3.5 Q16.2 6.0 16.2 8.6" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_right_hand" cx="16.2" cy="8.6" r="0.85" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>

    <rect id="mdm_head_document" x="1" y="-9" width="13" height="11" rx="2.4" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_corner_fold" d="M11.6 -9 L14 -9 L14 -6.6 Z" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.3"/>
    <g class="badge-pulse">
      <rect id="mdm_badge" x="2.1" y="-8.1" width="3.6" height="3.6" rx="0.6" fill="#1d4ed8"/>
      <path d="M2.9 -5.3 V-7.4 L3.9 -6.1 L4.9 -7.4 V-5.3" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="mdm_brows_group"><path d="M3.6 -6.2 h2.8" stroke="#0f172a" stroke-width="0.6" stroke-linecap="round"/>
         <path d="M8.8 -6.2 h2.8" stroke="#0f172a" stroke-width="0.6" stroke-linecap="round"/></g>
    <g id="eyes-js"><g class="blink" style="transform-origin:7.5px -3.5px"><g id="mdm_eyes_group">
    <ellipse cx="5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/>
    <ellipse cx="10.5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/><circle cx="5" cy="-3.8" r="0.5" fill="#0f172a"/><circle cx="10.5" cy="-3.8" r="0.5" fill="#0f172a"/><rect x="3.7" y="-5.2" width="2.6" height="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
         <rect x="9.2" y="-5.2" width="2.6" height="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/></g></g></g>
    <g id="mdm_mouth_group"><path d="M6 -1 q1.5 -0.8 3 0" stroke="#dc2626" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    <g class="sweat-fall" style="transform-origin:12px -8px"><path d="M12 -8.4 q0.9 1.3 0 2.2 q-0.9 -0.3 -0.9 -1.1 q0 -0.7 0.9 -1.1 z" fill="#38bdf8" opacity="0.9"/></g>
<path class="huff" d="M15 -0.6 q1 -0.4 1.8 0.2 M15.2 0.6 q1 -0.4 1.8 0.2" stroke="#0f172a" stroke-width="0.35" fill="none" stroke-linecap="round"/>
</svg>
