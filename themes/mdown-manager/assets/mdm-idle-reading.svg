<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .hl1 { animation: kf-hl1 4.5s infinite; }
    .hl2 { animation: kf-hl2 4.5s infinite; }
    .hl3 { animation: kf-hl3 4.5s infinite; }
    @keyframes kf-hl1 { 0%,5% { opacity: 0; } 8%,30% { opacity: 1; } 33%,100% { opacity: 0; } }
    @keyframes kf-hl2 { 0%,35% { opacity: 0; } 38%,60% { opacity: 1; } 63%,100% { opacity: 0; } }
    @keyframes kf-hl3 { 0%,65% { opacity: 0; } 68%,85% { opacity: 1; } 88%,100% { opacity: 0; } }
    .page-flip { animation: kf-flip 4.5s infinite; }
    @keyframes kf-flip { 0%,88% { transform: scaleX(1); } 93% { transform: scaleX(0.06); } 98%,100% { transform: scaleX(1); } }
    .read-eyes { animation: kf-read 1.5s infinite ease-in-out; }
    @keyframes kf-read { 0%,100% { transform: translate(-0.45px,0.55px); } 50% { transform: translate(0.45px,0.55px); } }
  </style></defs>

  <ellipse id="mdm_shadow" cx="7.5" cy="15.3" rx="6.2" ry="1.3" fill="#0f172a" opacity="0.16"/>
  <g id="mdm_legs_group" fill="#0f172a"><rect x="3.4" y="10" width="2.6" height="4.2" rx="1"/><rect x="9" y="10" width="2.6" height="4.2" rx="1"/></g>
  <g id="body-js"><g class="breathe" style="transform-origin:7.5px 6px">
    <rect id="mdm_body" x="2" y="2" width="11" height="8.4" rx="1.6" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_tie" d="M7 2.4 L8.3 2.4 L9 5 L7.5 9.6 L6 5 Z" fill="#1d4ed8"/>
    <rect x="10" y="3.4" width="2" height="2.4" rx="0.3" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.25"/>
    <rect x="10.7" y="3" width="0.55" height="1.2" rx="0.2" fill="#dc2626"/></g>
  </g>

    <rect id="mdm_head_document" x="1" y="-9" width="13" height="11" rx="2.4" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_corner_fold" d="M11.6 -9 L14 -9 L14 -6.6 Z" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.3"/>
    <g class="badge-pulse">
      <rect id="mdm_badge" x="2.1" y="-8.1" width="3.6" height="3.6" rx="0.6" fill="#1d4ed8"/>
      <path d="M2.9 -5.3 V-7.4 L3.9 -6.1 L4.9 -7.4 V-5.3" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="mdm_brows_group"><path d="M3.4 -6.9 q1.6 -0.4 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/>
         <path d="M8.6 -6.9 q1.6 -0.4 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    <g id="eyes-js"><g class="blink" style="transform-origin:7.5px -3.5px"><g id="mdm_eyes_group">
    <ellipse cx="5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/>
    <ellipse cx="10.5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/><g class="read-eyes" style="transform-origin:7.75px -3.8px"><circle cx="5" cy="-3.8" r="0.5" fill="#0f172a"/><circle cx="10.5" cy="-3.8" r="0.5" fill="#0f172a"/></g></g></g></g>
    <g id="mdm_mouth_group"><path d="M6.2 -0.9 h2.6" stroke="#dc2626" stroke-width="0.6" stroke-linecap="round"/></g>
    
<path id="mdm_left_arm" d="M2 3.5 Q1.9 4.0 4.9 4.4" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_left_hand" cx="4.9" cy="4.4" r="0.75" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
<path id="mdm_right_arm" d="M13 3.5 Q13.2 4.0 10.1 4.4" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_right_hand" cx="10.1" cy="4.4" r="0.75" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/>
<g transform="translate(4.6,0.4)"><g class="page-flip" style="transform-origin:2.9px 3.7px">
    <rect x="0.4" y="0.5" width="5.8" height="7.4" rx="0.6" fill="#0f172a" opacity="0.15"/>
    <rect x="0" y="0" width="5.8" height="7.4" rx="0.6" fill="#f4f8ff" stroke="#0f172a" stroke-width="0.4"/>
    <rect class="hl1" x="0.7" y="1.3" width="4.4" height="1.3" fill="#dfe9fb"/>
    <rect class="hl2" x="0.7" y="2.9" width="4.4" height="1.3" fill="#dfe9fb"/>
    <rect class="hl3" x="0.7" y="4.5" width="4.4" height="1.3" fill="#dfe9fb"/>
    <rect x="1" y="1.6" width="3.8" height="0.8" fill="#16a34a"/>
    <rect x="1" y="3.2" width="2.6" height="0.8" fill="#f2b632"/>
    <rect x="1" y="4.8" width="3.4" height="0.8" fill="#a9bce0"/></g></g>
</svg>
