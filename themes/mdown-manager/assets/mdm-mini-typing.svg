    <path id="mdm_tie" d="M7 2.4 L8.3 2.4 L9 5 L7.5 9.6 L6 5 Z" fill="#1d4ed8"/>
    <rect x="10" y="3.4" width="2" height="2.4" rx="0.3" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.25"/>
    <rect x="10.7" y="3" width="0.55" height="1.2" rx="0.2" fill="#dc2626"/></g>
  </g>
    <rect id="mdm_head_document" x="1" y="-9" width="13" height="11" rx="2.4" fill="#ffffff" stroke="#0f172a" stroke-width="0.4"/>
    <path id="mdm_corner_fold" d="M11.6 -9 L14 -9 L14 -6.6 Z" fill="#dfe9fb" stroke="#0f172a" stroke-width="0.3"/>
    <g class="badge-pulse">
      <rect id="mdm_badge" x="2.1" y="-8.1" width="3.6" height="3.6" rx="0.6" fill="#1d4ed8"/>
      <path d="M2.9 -5.3 V-7.4 L3.9 -6.1 L4.9 -7.4 V-5.3" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="mdm_brows_group"><path d="M3.4 -6.9 q1.6 -0.4 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/>
         <path d="M8.6 -6.9 q1.6 -0.4 3 0" stroke="#0f172a" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    <g id="eyes-js"><g class="blink" style="transform-origin:7.5px -3.5px"><g id="mdm_eyes_group">
    <ellipse cx="5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/>
    <ellipse cx="10.5" cy="-3.8" rx="1.1" ry="1.3" fill="#ffffff" stroke="#0f172a" stroke-width="0.35"/><circle cx="5" cy="-3.1" r="0.5" fill="#0f172a"/><circle cx="10.5" cy="-3.1" r="0.5" fill="#0f172a"/></g></g></g>
    <g id="mdm_mouth_group"><path d="M6 -1.3 q1.5 1.4 3 0" stroke="#dc2626" stroke-width="0.6" fill="none" stroke-linecap="round"/></g>
    </g>
<g transform="translate(1.5,8.7)">
    <rect x="-0.3" y="0" width="13" height="2.6" rx="0.35" fill="#33405f" stroke="#0f172a" stroke-width="0.28"/>
    <g fill="#5a6a95">
      <rect x="0.4" y="0.35" width="1" height="0.7" rx="0.15"/><rect x="1.7" y="0.35" width="1" height="0.7" rx="0.15"/><rect x="3" y="0.35" width="1" height="0.7" rx="0.15"/><rect x="4.3" y="0.35" width="1" height="0.7" rx="0.15"/><rect x="5.6" y="0.35" width="1" height="0.7" rx="0.15"/><rect x="6.9" y="0.35" width="1" height="0.7" rx="0.15"/><rect x="8.2" y="0.35" width="1" height="0.7" rx="0.15"/><rect x="9.5" y="0.35" width="1" height="0.7" rx="0.15"/><rect x="10.8" y="0.35" width="1" height="0.7" rx="0.15"/>
