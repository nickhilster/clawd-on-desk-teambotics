<g class="arm-tr" style="transform-origin:13px 3.5px"><path id="mdm_right_arm" d="M13 3.5 Q13.3 6.3 10.5 9.2" stroke="#ffffff" stroke-width="2.1" fill="none" stroke-linecap="round"/>
    <circle id="mdm_right_hand" cx="10.5" cy="9.2" r="0.75" fill="#ffffff" stroke="#0f172a" stroke-width="0.3"/></g>
</svg>
