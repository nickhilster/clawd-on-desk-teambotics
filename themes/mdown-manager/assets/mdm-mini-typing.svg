<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <defs><style>
    .breathe { animation: kf-breathe 3.6s infinite ease-in-out; }
    @keyframes kf-breathe { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.015,0.985); } }
    .blink { animation: kf-blink 4.2s infinite ease-in-out; }
    @keyframes kf-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }
    .badge-pulse { animation: kf-badge 2.6s infinite ease-in-out; }
    @keyframes kf-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

    .arm-tl { animation: kf-matl 0.16s infinite ease-in-out; }
    @keyframes kf-matl { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(6deg); } }
    .arm-tr { animation: kf-matr 0.13s infinite ease-in-out; }
    @keyframes kf-matr { 0%,100% { transform: rotate(3deg); } 50% { transform: rotate(-6deg); } }
    .kf1 { animation: kf-mkey 0.6s infinite; }
    .kf2 { animation: kf-mkey 0.75s infinite; animation-delay: -0.3s; }
    @keyframes kf-mkey { 0%,70%,100% { opacity: 0; } 35% { opacity: 0.9; } }
    .type-bounce { animation: kf-mtb 0.35s infinite ease-in-out; }
    @keyframes kf-mtb { 0%,100% { transform: translateY(0); } 50% { transform: translateY(0.4px); } }
  </style></defs>
<g class="type-bounce" style="transform-origin:7.5px 8px">
  <ellipse id="mdm_shadow" cx="7.5" cy="15.3" rx="6.2" ry="1.3" fill="#0f172a" opacity="0.16"/>
